version: '3.8'
services:
  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: investment_platform
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apassword
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=appuser
      - DB_PASS=apassword
      - DB_NAME=investment_platform
      - JWT_SECRET=change_this_to_a_random_value
      - SERVE_STATIC=true
      - FRONTEND_URL=http://localhost:5500
    ports:
      - '5000:5000'
    depends_on:
      - db
    volumes:
      - ./backend:/usr/src/app

volumes:
  db_data:
